<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COCKPIT V4 — Voyages21 · Auto-sync GitHub</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg: #0d1117; --bg2: #161b22; --bg3: #1c2333; --bg4: #212842;
--border: #2a3045; --border2: #3a4560;
--blue: #2f6fd4; --blue-l: #4a8ae8; --blue-dim: rgba(47,111,212,0.12);
--silver: #8b9ab5; --text: #e2e8f0; --text-m: #6b7fa3;
--white: #f8fafc; --green: #22c55e; --orange: #f59e0b; --red: #ef4444;
--radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Sora',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

header {
background:var(--bg2); border-bottom:1px solid var(--border);
padding:20px 32px; display:flex; align-items:center;
justify-content:space-between; flex-wrap:wrap; gap:16px;
position:sticky; top:0; z-index:50;
}
.logo { font-size:13px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--white); }
.logo span { color:var(--blue-l); }
.sync-badge {
display:flex; align-items:center; gap:8px;
background:var(--bg3); border:1px solid var(--border);
border-radius:20px; padding:6px 14px; font-size:11px; color:var(--silver);
}
.sync-dot { width:6px; height:6px; border-radius:50%; background:var(--silver); }
.sync-dot.ok { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 1.5s infinite; }
.sync-dot.err { background:var(--orange); }
.header-stats { display:flex; gap:24px; align-items:center; flex-wrap:wrap; }
.hstat { text-align:center; }
.hstat-val { font-size:22px; font-weight:800; color:var(--white); line-height:1; }
.hstat-lbl { font-size:10px; color:var(--text-m); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
.btn { background:var(--blue); color:#fff; border:none; padding:9px 18px; border-radius:7px; font-family:'Sora',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:background 0.2s; }
.btn:hover { background:var(--blue-l); }
.btn-ghost { background:transparent; border:1px solid var(--border2); color:var(--silver); }
.btn-ghost:hover { border-color:var(--blue); color:var(--blue-l); background:var(--blue-dim); }

.toolbar {
padding:14px 32px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;
border-bottom:1px solid var(--border); background:var(--bg2);
}
.chip {
background:transparent; border:1px solid var(--border); color:var(--text-m);
padding:5px 14px; border-radius:20px; font-size:11px; font-family:'Sora',sans-serif;
font-weight:500; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px; transition:all 0.15s;
}
.chip:hover, .chip.active { background:var(--blue-dim); border-color:var(--blue); color:var(--blue-l); }
.search-input {
margin-left:auto; background:var(--bg3); border:1px solid var(--border);
color:var(--text); padding:6px 14px; border-radius:7px; font-family:'Sora',sans-serif;
font-size:12px; outline:none; width:220px; transition:border-color 0.2s;
}
.search-input:focus { border-color:var(--blue); }
.search-input::placeholder { color:var(--text-m); }

/* SYNC BANNER */
.sync-banner {
margin:16px 32px 0; padding:12px 16px;
border-radius:8px; font-size:12px;
display:flex; align-items:center; gap:10px;
}
.sync-banner.loading { background:rgba(47,111,212,0.08); border:1px solid var(--border); color:var(--silver); }
.sync-banner.ok { background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.25); color:#4ade80; }
.sync-banner.err { background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.25); color:var(--orange); }

.main { padding:24px 32px; }
.section-label {
font-size:10px; font-weight:700; letter-spacing:2.5px;
text-transform:uppercase; color:var(--text-m);
padding:0 0 12px 2px; border-bottom:1px solid var(--border); margin-bottom:18px;
}
.section-block { margin-bottom:40px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }

/* CARD */
.card {
background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
padding:20px; cursor:pointer; transition:all 0.2s;
position:relative; display:flex; flex-direction:column; gap:12px;
}
.card:hover { border-color:var(--blue); transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.3); }
.card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.card-title { font-size:14px; font-weight:700; color:var(--white); line-height:1.3; }
.badge {
display:inline-flex; align-items:center; gap:5px; padding:3px 9px;
border-radius:12px; font-size:10px; font-weight:600;
text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; flex-shrink:0;
}
.badge::before { content:''; width:6px; height:6px; border-radius:50%; }
.badge.actif { background:rgba(34,197,94,0.12); color:#4ade80; border:1px solid rgba(34,197,94,0.25); }
.badge.actif::before { background:#22c55e; box-shadow:0 0 6px #22c55e; animation:pulse 1.5s infinite; }
.badge.planifie { background:rgba(107,127,163,0.12); color:var(--silver); border:1px solid var(--border); }
.badge.planifie::before { background:var(--silver); }
.badge.termine { background:rgba(47,111,212,0.12); color:var(--blue-l); border:1px solid rgba(47,111,212,0.25); }
.badge.termine::before { background:var(--blue-l); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.card-desc { font-size:12px; color:var(--text-m); line-height:1.55; border-left:2px solid var(--border2); padding-left:10px; }
.prog-row { display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--text-m); }
.prog-pct { font-family:'DM Mono',monospace; font-weight:500; color:var(--white); font-size:13px; }
.prog-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:5px; }
.prog-fill { height:100%; border-radius:2px; background:var(--blue); transition:width 0.6s ease; }
.prog-fill.high { background:var(--green); }
.prog-fill.med { background:var(--blue); }
.prog-fill.low { background:var(--orange); }
.card-footer {
display:flex; justify-content:space-between; align-items:center;
padding-top:10px; border-top:1px solid var(--border); font-size:11px; color:var(--text-m);
}
.link-detail { color:var(--blue-l); font-size:11px; font-weight:600; }

/* MODAL */
.overlay {
position:fixed; inset:0; background:rgba(0,0,0,0.8);
backdrop-filter:blur(6px); z-index:100; display:none; padding:20px; overflow-y:auto;
}
.overlay.open { display:flex; align-items:flex-start; justify-content:center; }
.modal {
background:var(--bg2); border:1px solid var(--border2); border-radius:14px;
width:100%; max-width:800px; margin:auto; overflow:hidden; animation:fadeUp 0.25s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.modal-hdr {
background:var(--bg3); padding:24px 28px; border-bottom:1px solid var(--border);
display:flex; align-items:flex-start; gap:14px; position:relative;
}
.modal-hdr-title { font-size:20px; font-weight:800; color:var(--white); }
.modal-hdr-sub { font-size:12px; color:var(--text-m); margin-top:4px; line-height:1.5; }
.btn-x {
position:absolute; top:16px; right:16px;
background:var(--bg4); border:1px solid var(--border); color:var(--silver);
width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:14px;
display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.btn-x:hover { background:var(--red); color:#fff; border-color:var(--red); }
.modal-body { padding:24px 28px; }
.modal-prog-bloc {
display:flex; gap:20px; align-items:center;
background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
padding:16px 20px; margin-bottom:20px;
}
.big-pct { font-size:48px; font-weight:800; color:var(--white); font-family:'DM Mono',monospace; flex-shrink:0; line-height:1; }
.big-pct span { font-size:22px; color:var(--silver); }
.prog-detail { flex:1; }
.prog-detail-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin:8px 0; }
.prog-detail-fill { height:100%; background:var(--blue); border-radius:3px; }
.prog-detail-label { font-size:11px; color:var(--text-m); }
.phases-ttl { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-m); margin-bottom:12px; }
.phase { margin-bottom:12px; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.phase-hdr { display:flex; align-items:center; gap:10px; padding:11px 14px; background:var(--bg3); }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.phase.done .dot { background:var(--green); }
.phase.in_progress .dot { background:var(--blue-l); animation:pulse 1.5s infinite; }
.phase.todo .dot { background:var(--border2); }
.phase-name { font-size:13px; font-weight:600; color:var(--white); flex:1; }
.phase-tag { font-size:10px; font-weight:700; text-transform:uppercase; padding:2px 8px; border-radius:10px; }
.phase.done .phase-tag { background:rgba(34,197,94,0.15); color:#4ade80; }
.phase.in_progress .phase-tag { background:rgba(47,111,212,0.15); color:var(--blue-l); }
.phase.todo .phase-tag { background:rgba(107,127,163,0.1); color:var(--silver); }
.phase-items { padding:12px 14px 12px 32px; display:flex; flex-direction:column; gap:6px; }
.phase-items li { font-size:12px; color:var(--text-m); list-style:none; position:relative; padding-left:14px; line-height:1.5; }
.phase.done .phase-items li::before { content:'✓'; position:absolute; left:0; color:var(--green); font-size:11px; font-weight:700; }
.phase.in_progress .phase-items li::before { content:'›'; position:absolute; left:0; color:var(--blue-l); font-size:14px; }
.phase.todo .phase-items li::before { content:'–'; position:absolute; left:0; color:var(--border2); }
.livrables-ttl { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-m); margin:20px 0 10px; }
.livrable-item {
display:flex; align-items:center; justify-content:space-between;
padding:9px 12px; border:1px solid var(--border); border-radius:7px; margin-bottom:6px;
background:var(--bg3);
}
.livrable-name { font-size:12px; color:var(--text); font-weight:500; }
.livrable-type { font-size:10px; color:var(--text-m); font-family:'DM Mono',monospace; }
.btn-open {
background:var(--blue-dim); border:1px solid rgba(47,111,212,0.3); color:var(--blue-l);
padding:4px 12px; border-radius:5px; font-size:11px; font-weight:600; cursor:pointer;
text-decoration:none; font-family:'Sora',sans-serif; transition:all 0.15s;
}
.btn-open:hover { background:var(--blue); color:#fff; }
.next-step-bloc {
background:rgba(245,158,11,0.07); border:1px solid rgba(245,158,11,0.2);
border-radius:7px; padding:10px 14px; margin-bottom:16px;
}
.next-step-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--orange); margin-bottom:4px; }
.next-step-val { font-size:12px; color:var(--text); line-height:1.5; }
.stack-bloc { margin-top:16px; padding:12px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; }
.stack-lbl { font-size:10px; color:var(--text-m); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.stack-val { font-family:'DM Mono',monospace; font-size:12px; color:var(--blue-l); line-height:1.6; }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:3px; }

@media(max-width:640px){
header,.toolbar,.main { padding-left:16px; padding-right:16px; }
.sync-banner { margin-left:16px; margin-right:16px; }
.grid { grid-template-columns:1fr; }
.modal-hdr,.modal-body { padding-left:16px; padding-right:16px; }
}
</style>
</head>
<body>

<header>
<div class="logo">Cockpit <span>Projets</span> — Karim Zoubdane 2026</div>
<div class="header-stats">
<div class="hstat"><div class="hstat-val" id="s-total">0</div><div class="hstat-lbl">Projets</div></div>
<div class="hstat"><div class="hstat-val" id="s-actifs">0</div><div class="hstat-lbl">Actifs</div></div>
<div class="hstat"><div class="hstat-val" id="s-avg">0%</div><div class="hstat-lbl">Avancement moy.</div></div>
<div class="sync-badge"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Synchronisation...</span></div>
<button class="btn btn-ghost" onclick="loadData()" style="font-size:11px;padding:6px 14px;">Rafraichir</button>
</div>
</header>

<div class="sync-banner loading" id="sync-banner">
<span>Chargement des données depuis GitHub...</span>
</div>

<div class="toolbar">
<button class="chip active" onclick="filter('all',this)">Tous</button>
<button class="chip" onclick="filter('actif',this)">En cours</button>
<button class="chip" onclick="filter('planifie',this)">Planifies</button>
<button class="chip" onclick="filter('termine',this)">Termines</button>
<button class="chip" onclick="filter('agent',this)">Agents IA</button>
<input class="search-input" type="text" placeholder="Rechercher un projet..." oninput="search(this.value)">
</div>

<div class="main" id="main"><div style="text-align:center;color:var(--text-m);padding:60px">Chargement...</div></div>

<!-- DETAIL MODAL -->
<div class="overlay" id="ov-detail" onclick="closeOv(event,'ov-detail')">
<div class="modal">
<div class="modal-hdr" id="d-hdr"></div>
<div class="modal-body" id="d-body"></div>
</div>
</div>

<script>
const GITHUB_RAW = 'https://raw.githubusercontent.com/karimzoubdane-debug/voyages21/main/cockpit-data.json';
let projects = [];
let currentFilter = 'all';
let currentSearch = '';

async function loadData() {
  const banner = document.getElementById('sync-banner');
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  banner.className = 'sync-banner loading';
  banner.innerHTML = '<span>Synchronisation avec GitHub en cours...</span>';
  dot.className = 'sync-dot';
  label.textContent = 'Synchronisation...';

  try {
    const cacheBust = '?t=' + Date.now();
    const res = await fetch(GITHUB_RAW + cacheBust);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    projects = data.projects || [];
    const meta = data._meta || {};
    const lastUpdate = meta.last_updated || '—';
    const updatedBy = meta.updated_by || '—';

    dot.className = 'sync-dot ok';
    label.textContent = 'Synchro GitHub OK';
    banner.className = 'sync-banner ok';
    banner.innerHTML = `<span>Données GitHub chargées — Dernière mise à jour : <strong>${lastUpdate}</strong> par <strong>${updatedBy}</strong></span>`;

    render();
  } catch(err) {
    dot.className = 'sync-dot err';
    label.textContent = 'Hors ligne';
    banner.className = 'sync-banner err';
    banner.innerHTML = `<span>GitHub inaccessible (${err.message}) — Affichage des dernières données locales</span>`;
    const cached = localStorage.getItem('cockpit_projects_cache');
    if (cached) { projects = JSON.parse(cached); render(); }
    else { document.getElementById('main').innerHTML = '<div style="text-align:center;color:var(--orange);padding:60px">Impossible de charger les données. Vérifiez votre connexion.</div>'; }
  }
  // Cache locale en fallback
  if (projects.length) localStorage.setItem('cockpit_projects_cache', JSON.stringify(projects));
}

function calcProg(p) {
  if (!p.phases || !p.phases.length) return 0;
  let total=0, done=0;
  p.phases.forEach(ph => {
    const n = ph.items.length;
    total += n;
    if (ph.state==='done') done += n;
    else if (ph.state==='in_progress') done += Math.ceil(n*0.4);
  });
  return total===0 ? 0 : Math.round((done/total)*100);
}

const CATS = [
  { key:'business', label:'Business Voyages 21' },
  { key:'eco', label:'Ecotourisme & Immobilier' },
  { key:'web', label:'Creation de Sites Web' },
  { key:'agent', label:'Armee des Anges — Agents IA' },
  { key:'veille', label:'Veille & Expertise' }
];

function render() {
  const main = document.getElementById('main');
  const visible = projects.filter(p => {
    const matchF = currentFilter==='all' || p.status===currentFilter || p.cat===currentFilter;
    const matchS = !currentSearch || p.title.toLowerCase().includes(currentSearch) || (p.desc&&p.desc.toLowerCase().includes(currentSearch));
    return matchF && matchS;
  });
  const grouped = {};
  CATS.forEach(c => { grouped[c.key]=[]; });
  visible.forEach(p => { if(grouped[p.cat]) grouped[p.cat].push(p); });
  let html = '';
  CATS.forEach(c => {
    const items = grouped[c.key];
    if (!items.length) return;
    html += `<div class="section-block"><div class="section-label">${c.label} — ${items.length} projet${items.length>1?'s':''}</div><div class="grid">${items.map(cardHTML).join('')}</div></div>`;
  });
  main.innerHTML = html || '<div style="text-align:center;color:var(--text-m);padding:60px">Aucun projet trouvé</div>';
  updateStats();
}

function cardHTML(p) {
  const prog = calcProg(p);
  const fillClass = prog>=70?'high':prog>=30?'med':'low';
  const phases = p.phases||[];
  const donePh = phases.filter(ph=>ph.state==='done').length;
  const badgeLabel = p.status==='actif'?'En cours':p.status==='planifie'?'Planifie':'Termine';
  return `<div class="card" onclick="openDetail(${p.id})">
<div class="card-top"><div class="card-title">${esc(p.title)}</div><span class="badge ${p.status}">${badgeLabel}</span></div>
<div class="card-desc">${esc((p.desc||'').substring(0,100))}...</div>
<div><div class="prog-row"><span>${donePh}/${phases.length} phases</span><span class="prog-pct">${prog}%</span></div><div class="prog-bar"><div class="prog-fill ${fillClass}" style="width:${prog}%"></div></div></div>
<div class="card-footer"><span>Prochaine : ${p.nextStep?esc(p.nextStep.substring(0,40))+'…':'—'}</span><span class="link-detail">Voir &rsaquo;</span></div>
</div>`;
}

function esc(str) { if(!str) return ''; return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

function updateStats() {
  document.getElementById('s-total').textContent = projects.length;
  document.getElementById('s-actifs').textContent = projects.filter(p=>p.status==='actif').length;
  const avg = projects.length ? Math.round(projects.reduce((s,p)=>s+calcProg(p),0)/projects.length) : 0;
  document.getElementById('s-avg').textContent = avg+'%';
}

function openDetail(id) {
  const p = projects.find(x=>x.id===id);
  if (!p) return;
  const prog = calcProg(p);
  const phases = p.phases||[];
  const donePh = phases.filter(ph=>ph.state==='done').length;
  const fillClass = prog>=70?'high':prog>=30?'med':'low';
  const badgeLabel = p.status==='actif'?'En cours':p.status==='planifie'?'Planifie':'Termine';
  document.getElementById('d-hdr').innerHTML = `<div style="flex:1"><div class="modal-hdr-title">${esc(p.title)}</div><div class="modal-hdr-sub">${esc(p.desc)}</div><span class="badge ${p.status}" style="margin-top:10px;display:inline-flex">${badgeLabel}</span></div><button class="btn-x" onclick="closeModal()">X</button>`;
  const phasesHTML = phases.map(ph=>`<div class="phase ${ph.state}"><div class="phase-hdr"><div class="dot"></div><div class="phase-name">${esc(ph.name)}</div><span class="phase-tag">${ph.state==='done'?'Termine':ph.state==='in_progress'?'En cours':'A faire'}</span></div><ul class="phase-items">${ph.items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`).join('');
  const livsHTML = (p.livrables&&p.livrables.length)?`<div class="livrables-ttl">Livrables</div>${p.livrables.map(l=>`<div class="livrable-item"><div><div class="livrable-name">${esc(l.name)}</div><div class="livrable-type">${esc(l.type)}</div></div><a class="btn-open" href="${l.url}" target="_blank">Ouvrir</a></div>`).join('')}`:'';
  document.getElementById('d-body').innerHTML = `<div class="modal-prog-bloc"><div class="big-pct">${prog}<span>%</span></div><div class="prog-detail"><div class="prog-detail-label">${donePh} phase${donePh>1?'s':''} terminée${donePh>1?'s':''} sur ${phases.length}</div><div class="prog-detail-bar"><div class="prog-detail-fill ${fillClass}" style="width:${prog}%"></div></div></div></div>${p.nextStep?`<div class="next-step-bloc"><div class="next-step-lbl">Prochaine etape</div><div class="next-step-val">${esc(p.nextStep)}</div></div>`:''}<div class="phases-ttl">Planning & Etapes</div>${phasesHTML}${p.stack?`<div class="stack-bloc"><div class="stack-lbl">Stack</div><div class="stack-val">${esc(p.stack)}</div></div>`:''} ${livsHTML}`;
  document.getElementById('ov-detail').classList.add('open');
}

function closeModal() { document.getElementById('ov-detail').classList.remove('open'); }
function closeOv(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }
function filter(f,btn) { currentFilter=f; document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function search(v) { currentSearch=v.toLowerCase(); render(); }

// Auto-refresh toutes les 5 minutes
setInterval(loadData, 5*60*1000);

// Chargement initial
loadData();
</script>
</body>
</html>
